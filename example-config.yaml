# =============================================================================
# API TOKENS (for external scripts, agents, HA callbacks, "cool things like you")
# =============================================================================
# Create via the /config page UI (or future CLI). Tokens are prefixed rla_ and shown only once.
# Use as: Authorization: Bearer rla_xxxxxxxxxxxxxxxx
# Scopes: "full" (default) or comma-separated subsets.
# Example uses: custom Python agents, Omada/UniFi addons, external dashboards, HA REST commands.
# All /api/* endpoints accept either session cookie (web UI) or valid Bearer rla_ token.

